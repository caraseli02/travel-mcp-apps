<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Activities</title>
<style>
*,*::before,*::after{box-sizing:border-box}
[hidden]{display:none!important}
:root{color-scheme:light;--bg:#fff;--surface:#f7f7f7;--surface-2:#fbfbfb;--line:#e8e3dc;--line-strong:#d7d0c6;--text:#171412;--muted:#6f6a64;--soft:#9b948c;--accent:#9a4f2f;--accent-ink:#73351e;--accent-soft:#fff3ec;--danger:#a03a2b;--radius:10px;--shadow:0 1px 2px rgba(23,20,18,.04),0 8px 28px rgba(23,20,18,.06)}
body{margin:0;min-width:280px;background:Canvas;color:CanvasText;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font:inherit;color:inherit}.shell{max-width:720px;margin:0 auto;padding:14px}.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:10px}.section-kicker{color:var(--soft);font-size:11px;font-weight:650;letter-spacing:.06em;text-transform:uppercase}.section-title{margin:3px 0 0;color:var(--text);font-size:15px;font-weight:650;letter-spacing:0}.section-desc{margin:2px 0 0;color:var(--muted);font-size:12px}.widget{border:1px solid var(--line);border-radius:var(--radius);background:var(--bg);box-shadow:var(--shadow);overflow:hidden}.empty,.error{min-height:236px;display:grid;place-items:center;padding:28px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);color:var(--muted);font-size:14px;text-align:center}.error{color:var(--danger)}.activity-list{display:flex;flex-direction:column}.activity{display:grid;grid-template-columns:42px minmax(0,1fr) auto;gap:11px;align-items:start;padding:12px 13px;border-bottom:1px solid var(--line)}.activity:last-child{border-bottom:0}.mark{width:42px;height:42px;border:1px solid var(--line);border-radius:9px;color:var(--accent-ink);background:var(--surface-2);display:grid;place-items:center;flex:0 0 auto}.mark svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.65;stroke-linecap:round;stroke-linejoin:round}.activity h3{margin:0 0 2px;color:var(--text);font-size:13px;line-height:1.25;overflow-wrap:break-word}.activity p{margin:0;color:var(--muted);font-size:12px;overflow-wrap:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.activity>div:nth-child(2){min-width:0}.meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}.badge,.pill{display:inline-flex;align-items:center;min-height:20px;border-radius:999px;padding:0 7px;font-size:11px;font-weight:620;white-space:nowrap}.badge{background:var(--accent-soft);color:var(--accent-ink)}.pill{border:1px solid var(--line);color:var(--muted);background:var(--surface-2)}.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}.btn{appearance:none;border:1px solid var(--line-strong);border-radius:8px;background:var(--bg);color:var(--text);min-height:34px;padding:0 11px;font-size:12px;font-weight:600;cursor:pointer}.btn:hover{background:var(--surface)}.btn.primary{border-color:var(--accent);background:var(--accent);color:#fff}.activity .save{justify-self:end;min-width:54px}.activity.is-saved{background:#fffaf6}.activity.is-saved .save{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-soft)}.card-actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;padding:10px 13px;border-top:1px solid var(--line);background:var(--surface-2)}
@media(max-width:640px){.activity{grid-template-columns:38px minmax(0,1fr);gap:10px}.activity p{display:block}.activity .save{grid-column:2;justify-self:start;margin-top:2px}.card-actions{justify-content:flex-start}}
</style>
</head>
<body>
<main class="shell" aria-live="polite">
  <section class="empty" id="empty">Waiting for activity recommendations...</section>
  <section id="content" hidden>
    <div class="section-head">
      <div>
        <div class="section-kicker">Explore</div>
        <h1 class="section-title" id="title">Activities</h1>
        <p class="section-desc" id="summary">Options with just enough context to decide what belongs in the trip.</p>
      </div>
    </div>
    <article class="widget" aria-label="Activity suggestions">
      <div class="activity-list" id="activities"></div>
      <div class="card-actions">
        <button class="btn" type="button">Ask for alternates</button>
        <button class="btn primary" type="button">Add saved to board</button>
      </div>
    </article>
  </section>
</main>
<script>
const elements={empty:document.getElementById("empty"),content:document.getElementById("content"),title:document.getElementById("title"),summary:document.getElementById("summary"),activities:document.getElementById("activities")};
function unwrapToolOutput(raw){return raw?.structuredContent??raw?.toolOutput??raw}
function showEmpty(message){elements.empty.textContent=message;elements.empty.className="empty";elements.empty.hidden=false;elements.content.hidden=true}
function showError(message){elements.empty.textContent=message||"Activities are unavailable.";elements.empty.className="error";elements.empty.hidden=false;elements.content.hidden=true}
function iconFor(category){if(String(category).toLowerCase().includes("museum"))return'<rect x="4" y="5" width="16" height="14" rx="2"/><path d="M8 15l3-4 2 3 2-2 2 3"/>';if(String(category).toLowerCase().includes("food"))return'<path d="M7 3v18M5 3v7a2 2 0 0 0 4 0V3M15 3v18M15 3c3 2 4 5 3 9h-3"/>';return'<path d="M4 9h16M6 9v10M10 9v10M14 9v10M18 9v10M3 19h18M12 4l8 5H4l8-5z"/>'}
function renderActivity(activity){const row=document.createElement("div");row.className="activity";row.innerHTML=`<div class="mark" aria-hidden="true"><svg viewBox="0 0 24 24">${iconFor(activity.category)}</svg></div><div><h2></h2><p></p><div class="meta"></div></div><button class="btn save" type="button" aria-pressed="false">Save</button>`;row.querySelector("h2").textContent=activity.name||"Activity";row.querySelector("p").textContent=activity.description||"";const meta=row.querySelector(".meta");[activity.category,activity.duration_hours?activity.duration_hours+"h":null,activity.cost_usd===0?"Free":activity.cost_usd?"USD"+activity.cost_usd:null].filter(Boolean).forEach((value,index)=>{const tag=document.createElement("span");tag.className=index===0?"badge":"pill mono";tag.textContent=value;meta.appendChild(tag)});const button=row.querySelector(".save");button.addEventListener("click",()=>{const saved=button.getAttribute("aria-pressed")!=="true";button.setAttribute("aria-pressed",String(saved));button.textContent=saved?"Saved":"Save";row.classList.toggle("is-saved",saved)});return row}
function render(raw){const output=unwrapToolOutput(raw);if(!output)return;if(output.error){showError(output.error);return}const activities=Array.isArray(output.activities)?output.activities:[];if(activities.length===0){showEmpty("No activity recommendations were returned.");return}elements.empty.hidden=true;elements.content.hidden=false;elements.title.textContent=(output.city||"Destination")+" activities";elements.summary.textContent=activities.length+" option"+(activities.length===1?"":"s")+" matched to "+[output.weather,output.season].filter(Boolean).join(" · ");elements.activities.replaceChildren();activities.forEach(item=>elements.activities.appendChild(renderActivity(item)))}
function currentToolOutput(){return window.openai?.toolOutput}
render(currentToolOutput());let checksRemaining=50;const checkForLateOutput=window.setInterval(()=>{render(currentToolOutput());checksRemaining-=1;if(checksRemaining<=0||currentToolOutput())window.clearInterval(checkForLateOutput)},100);
window.addEventListener("message",(event)=>{let message=event.data;if(typeof message==="string"){try{message=JSON.parse(message)}catch{return}}if(message?.jsonrpc==="2.0"&&message.method==="ui/notifications/tool-result")render(message.params)},{passive:true});
window.addEventListener("openai:set_globals",(event)=>{render(event.detail?.globals?.toolOutput??window.openai?.toolOutput)},{passive:true});
</script>
</body>
</html>
