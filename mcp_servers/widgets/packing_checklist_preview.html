<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Packing Checklist Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #ffffff;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(900px, 100%);
        margin: 0 auto;
      }

      iframe {
        display: block;
        width: 100%;
        height: 700px;
        border: 0;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <main>
      <iframe
        id="widget"
        title="Packing checklist widget preview"
        src="packing_checklist_v1.html"
      ></iframe>
    </main>

    <script>
      const mockPacking = {
        destination: "Amsterdam",
        duration_days: 5,
        weather_summary: {
          city: "Amsterdam",
          weather_category: "mild",
          min_temp_c: 11,
          max_temp_c: 19,
          max_precipitation_prob: 68,
          rain_expected: true,
        },
        categories: {
          clothing: ["Light jacket", "Long pants", "Comfortable shoes"],
          toiletries: ["Toothbrush", "Toothpaste", "Deodorant", "Medication"],
          electronics: ["Phone charger", "Power adapter", "Headphones"],
          documents: ["Passport or ID", "Travel insurance", "Booking confirmations"],
          accessories: ["Day bag", "Reusable water bottle", "Umbrella", "Rain jacket", "Laundry bag"],
        },
        weather_based_items: [
          {
            item: "Umbrella",
            reason: "Precipitation probability reaches 68%",
          },
          {
            item: "Rain jacket",
            reason: "Precipitation probability reaches 68%",
          },
        ],
        notes: ["Pack 3 days of core clothing plus 1 extra clothing set(s)."],
      };

      const iframe = document.getElementById("widget");
      iframe.addEventListener("load", () => {
        iframe.contentWindow.openai = { toolOutput: mockPacking };
        iframe.contentWindow.dispatchEvent(
          new CustomEvent("openai:set_globals", {
            detail: { globals: { toolOutput: mockPacking } },
          })
        );
      });
    </script>
  </body>
</html>
