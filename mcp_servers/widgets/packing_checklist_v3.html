<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Packing checklist</title>
<style>
*,*::before,*::after{box-sizing:border-box}[hidden]{display:none!important}:root{color-scheme:light;--bg:#fff;--surface:#f7f7f7;--surface-2:#fbfbfb;--line:#e8e3dc;--line-strong:#d7d0c6;--text:#171412;--muted:#6f6a64;--soft:#9b948c;--accent:#9a4f2f;--accent-ink:#73351e;--green:#376b4a;--gold:#80611c;--danger:#a03a2b;--radius:10px;--shadow:0 1px 2px rgba(23,20,18,.04),0 8px 28px rgba(23,20,18,.06)}body{margin:0;min-width:280px;background:Canvas;color:CanvasText;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45;overflow-x:hidden}button{font:inherit;color:inherit}.shell{max-width:720px;margin:0 auto;padding:14px}.section-head{margin-bottom:10px}.section-kicker{color:var(--soft);font-size:11px;font-weight:650;letter-spacing:.06em;text-transform:uppercase}.section-title{margin:3px 0 0;color:var(--text);font-size:15px;font-weight:650}.section-desc{margin:2px 0 0;color:var(--muted);font-size:12px}.widget{border:1px solid var(--line);border-radius:var(--radius);background:var(--bg);box-shadow:var(--shadow);overflow:hidden}.empty,.error{min-height:236px;display:grid;place-items:center;padding:28px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);color:var(--muted);font-size:14px;text-align:center}.error{color:var(--danger)}.btn{appearance:none;border:1px solid var(--line-strong);border-radius:8px;background:var(--bg);color:var(--text);min-height:34px;padding:0 11px;font-size:12px;font-weight:600;cursor:pointer}.btn.primary{border-color:var(--accent);background:var(--accent);color:#fff}.pack-summary{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:13px;border-bottom:1px solid var(--line)}.ring{width:46px;aspect-ratio:1;border-radius:50%;background:conic-gradient(var(--green) 0 var(--degrees),var(--surface) var(--degrees) 360deg);display:grid;place-items:center;color:var(--text);font-size:12px;font-weight:720}.ring::before{content:attr(data-label);width:32px;aspect-ratio:1;border-radius:50%;display:grid;place-items:center;background:var(--bg)}.pack-copy h2{margin:0;color:var(--text);font-size:13px}.pack-copy p{margin:2px 0 0;color:var(--muted);font-size:12px}.pack-groups{padding:7px 0}.pack-group{border-bottom:1px solid var(--line)}.pack-group:last-child{border-bottom:0}.pack-toggle{width:100%;border:0;background:transparent;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 13px;cursor:pointer}.pack-toggle:hover{background:var(--surface-2)}.pack-label{display:flex;align-items:center;gap:9px;min-width:0;color:var(--text);font-size:12px;font-weight:650}.pack-symbol{width:22px;height:22px;border-radius:7px;border:1px solid var(--line);display:grid;place-items:center;color:var(--accent-ink);font-size:11px;font-weight:720;flex:0 0 auto}.pill{display:inline-flex;align-items:center;min-height:20px;border-radius:999px;padding:0 7px;border:1px solid var(--line);color:var(--muted);background:var(--surface-2);font-size:11px;font-weight:620;white-space:nowrap;font-variant-numeric:tabular-nums}.chev{width:7px;height:7px;border-right:1.5px solid var(--soft);border-bottom:1.5px solid var(--soft);transform:rotate(45deg);transition:transform .16s;flex:0 0 auto}.pack-group.is-closed .chev{transform:rotate(-45deg)}.pack-items{display:grid;gap:1px;padding:0 13px 9px 44px}.pack-group.is-closed .pack-items{display:none}.pack-item{display:grid;grid-template-columns:18px minmax(0,1fr) auto;gap:8px;align-items:center;width:100%;border:0;border-radius:7px;background:transparent;min-height:32px;padding:4px 6px;text-align:left;cursor:pointer}.pack-item:hover{background:var(--surface-2)}.check{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--line-strong)}.pack-item.is-done .check{border-color:var(--green);background:var(--green);box-shadow:inset 0 0 0 3px #fff}.pack-item span{color:var(--text);font-size:12px}.pack-item.is-done span{text-decoration:line-through;color:var(--soft)}.hint{color:var(--gold);font-size:11px;font-weight:650}
@media(max-width:430px){.pack-summary{grid-template-columns:auto 1fr}.pack-summary .btn{grid-column:1/-1;justify-self:start}}
</style>
</head>
<body>
<main class="shell" aria-live="polite">
  <section class="empty" id="empty">Waiting for packing checklist...</section>
  <section id="content" hidden>
    <div class="section-head"><div class="section-kicker">Prepare</div><h1 class="section-title">Packing checklist</h1><p class="section-desc">Weather-aware essentials with direct edits that persist inside the card.</p></div>
    <article class="widget" aria-label="Packing checklist">
      <div class="pack-summary"><div class="ring" id="ring" data-label="0%"></div><div class="pack-copy"><h2 id="destination">Trip</h2><p id="summary"></p></div><button class="btn primary" type="button">Add missing</button></div>
      <div class="pack-groups" id="groups"></div>
    </article>
  </section>
</main>
<script>
const elements={empty:document.getElementById("empty"),content:document.getElementById("content"),ring:document.getElementById("ring"),destination:document.getElementById("destination"),summary:document.getElementById("summary"),groups:document.getElementById("groups")};
function unwrapToolOutput(raw){return raw?.structuredContent??raw?.toolOutput??raw}
function showEmpty(message){elements.empty.textContent=message;elements.empty.className="empty";elements.empty.hidden=false;elements.content.hidden=true}
function showError(message){elements.empty.textContent=message||"Packing checklist is unavailable.";elements.empty.className="error";elements.empty.hidden=false;elements.content.hidden=true}
function titleize(value){return String(value||"Items").replace(/_/g," ").replace(/\b\w/g,char=>char.toUpperCase())}
function renderGroup(name,items,index){const group=document.createElement("div");group.className=index===0?"pack-group":"pack-group is-closed";group.innerHTML='<button class="pack-toggle" type="button"><span class="pack-label"><span class="pack-symbol"></span><span class="name"></span><span class="pill"></span></span><span class="chev" aria-hidden="true"></span></button><div class="pack-items"></div>';const toggle=group.querySelector(".pack-toggle");toggle.setAttribute("aria-expanded",String(index===0));group.querySelector(".pack-symbol").textContent=String(name).charAt(0).toUpperCase();group.querySelector(".name").textContent=titleize(name);group.querySelector(".pill").textContent="0/"+items.length;const slot=group.querySelector(".pack-items");items.forEach(item=>{const button=document.createElement("button");button.className="pack-item";button.type="button";button.setAttribute("aria-pressed","false");button.innerHTML='<span class="check"></span><span></span><span class="hint"></span>';button.querySelector("span:nth-child(2)").textContent=item;button.addEventListener("click",()=>{const done=button.getAttribute("aria-pressed")!=="true";button.setAttribute("aria-pressed",String(done));button.classList.toggle("is-done",done);updateProgress()});slot.appendChild(button)});toggle.addEventListener("click",()=>{const closed=group.classList.toggle("is-closed");toggle.setAttribute("aria-expanded",String(!closed))});return group}
function updateProgress(){const items=[...document.querySelectorAll(".pack-item")];const done=items.filter(item=>item.classList.contains("is-done")).length;const percent=items.length?Math.round(done/items.length*100):0;elements.ring.style.setProperty("--degrees",Math.round(percent/100*360)+"deg");elements.ring.dataset.label=percent+"%";elements.summary.dataset.done=done;elements.summary.textContent=elements.summary.dataset.base+" · "+done+" of "+items.length+" items packed"}
function render(raw){const output=unwrapToolOutput(raw);if(!output)return;if(output.error){showError(output.error);return}const categories=output.categories||{};const entries=Object.entries(categories);if(entries.length===0){showEmpty("No packing checklist data was returned.");return}const weather=output.weather_summary||{};elements.empty.hidden=true;elements.content.hidden=false;elements.destination.textContent=(output.destination||weather.city||"Trip")+" · "+(weather.weather_category?titleize(weather.weather_category):output.duration_days+" day trip");elements.summary.dataset.base=[weather.min_temp_c!==undefined&&weather.max_temp_c!==undefined?weather.min_temp_c+"-"+weather.max_temp_c+" C":null,weather.rain_expected?"Rain likely":null].filter(Boolean).join(" · ")||"Ready to pack";elements.groups.replaceChildren();entries.forEach(([name,items],index)=>elements.groups.appendChild(renderGroup(name,items,index)));updateProgress()}
function currentToolOutput(){return window.openai?.toolOutput}
render(currentToolOutput());let checksRemaining=50;const checkForLateOutput=window.setInterval(()=>{render(currentToolOutput());checksRemaining-=1;if(checksRemaining<=0||currentToolOutput())window.clearInterval(checkForLateOutput)},100);
window.addEventListener("message",(event)=>{let message=event.data;if(typeof message==="string"){try{message=JSON.parse(message)}catch{return}}if(message?.jsonrpc==="2.0"&&message.method==="ui/notifications/tool-result")render(message.params)},{passive:true});
window.addEventListener("openai:set_globals",(event)=>{render(event.detail?.globals?.toolOutput??window.openai?.toolOutput)},{passive:true});
</script>
</body>
</html>
