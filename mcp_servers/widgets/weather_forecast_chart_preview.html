<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forecast Chart Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(rgba(17, 27, 32, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(17, 27, 32, 0.035) 1px, transparent 1px),
          #dfe6e2;
        background-size: 34px 34px, 34px 34px, auto;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, 100%);
        margin: 0 auto;
      }

      iframe {
        display: block;
        width: 100%;
        height: 560px;
        border: 0;
        background: transparent;
      }

      @media (max-width: 560px) {
        iframe {
          height: 720px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <iframe
        id="widget"
        title="Forecast chart widget preview"
        src="weather_forecast_chart_v1.html"
      ></iframe>
    </main>

    <script>
      const mockForecast = {
        city: "Madrid",
        forecasts: [
          {
            date: "2026-05-01",
            temp_high_c: 23,
            temp_low_c: 13,
            conditions: "Scattered Clouds",
            precipitation_prob: 10,
            humidity: 58,
            wind_speed: 4,
          },
          {
            date: "2026-05-02",
            temp_high_c: 25,
            temp_low_c: 14,
            conditions: "Clear Sky",
            precipitation_prob: 0,
            humidity: 48,
            wind_speed: 3,
          },
          {
            date: "2026-05-03",
            temp_high_c: 21,
            temp_low_c: 12,
            conditions: "Light Rain",
            precipitation_prob: 62,
            humidity: 78,
            wind_speed: 6,
          },
          {
            date: "2026-05-04",
            temp_high_c: 20,
            temp_low_c: 11,
            conditions: "Overcast Clouds",
            precipitation_prob: 35,
            humidity: 72,
            wind_speed: 5,
          },
          {
            date: "2026-05-05",
            temp_high_c: 24,
            temp_low_c: 13,
            conditions: "Clear Sky",
            precipitation_prob: 5,
            humidity: 50,
            wind_speed: 3,
          },
        ],
      };

      const iframe = document.getElementById("widget");
      iframe.addEventListener("load", () => {
        iframe.contentWindow.openai = { toolOutput: mockForecast };
        iframe.contentWindow.dispatchEvent(
          new CustomEvent("openai:set_globals", {
            detail: { globals: { toolOutput: mockForecast } },
          })
        );
      });
    </script>
  </body>
</html>
