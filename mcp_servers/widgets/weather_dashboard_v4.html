<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light;
        --ink: #111b20;
        --muted: #637177;
        --paper: #fffaf0;
        --paper-strong: #fffdf7;
        --line: transparent;
        --green: #345e48;
        --green-soft: #dfe9dd;
        --sun: #e3a72d;
        --sun-soft: #f5dfad;
        --sky: #7bb0c1;
        --rain: #416f93;
        --clay: #a45e43;
        --danger: #923232;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 280px;
        color: var(--ink);
        background:
          linear-gradient(115deg, rgba(255, 250, 240, 0.96), rgba(235, 243, 239, 0.9)),
          radial-gradient(circle at 88% 6%, rgba(227, 167, 45, 0.32), transparent 28%),
          radial-gradient(circle at 3% 96%, rgba(123, 176, 193, 0.34), transparent 34%);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .dashboard {
        position: relative;
        isolation: isolate;
        overflow: hidden;
        min-height: 348px;
        padding: 18px;
        background:
          linear-gradient(rgba(17, 27, 32, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(17, 27, 32, 0.025) 1px, transparent 1px),
          linear-gradient(145deg, rgba(255, 250, 240, 0.96), rgba(241, 247, 244, 0.82));
        background-size: 28px 28px, 28px 28px, auto;
      }

      .dashboard::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
      }

      .dashboard::after {
        content: "";
        position: absolute;
        right: -58px;
        top: -72px;
        z-index: -1;
        width: 184px;
        height: 184px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 42% 40%, rgba(227, 167, 45, 0.72), transparent 34%),
          radial-gradient(circle, rgba(227, 167, 45, 0.2), transparent 66%);
      }

      .empty,
      .error {
        display: grid;
        min-height: 292px;
        place-items: center;
        padding: 34px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
        text-align: center;
      }

      .empty::before {
        content: "";
        display: block;
        width: 44px;
        height: 44px;
        margin: 0 auto 14px;
        border-radius: 50%;
        background: conic-gradient(var(--sun), rgba(227, 167, 45, 0.08));
        animation: spin 1.2s linear infinite;
      }

      .error {
        color: var(--danger);
      }

      .content {
        display: grid;
        gap: 14px;
      }

      .header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: start;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        margin: 0 0 8px;
        color: var(--green);
        font-size: 11px;
        font-weight: 820;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--sun);
        box-shadow: 12px 0 0 var(--sky);
      }

      h1 {
        margin: 0;
        max-width: 12ch;
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        font-size: clamp(34px, 8vw, 52px);
        font-weight: 680;
        line-height: 0.94;
        letter-spacing: 0;
      }

      .timestamp {
        min-width: 112px;
        max-width: 136px;
        padding: 8px 10px;
        background: rgba(255, 253, 247, 0.68);
        color: var(--muted);
        font-size: 12px;
        font-weight: 680;
        line-height: 1.3;
        text-align: right;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(132px, 164px);
        gap: 10px;
        align-items: stretch;
      }

      .temperature-panel,
      .condition,
      .metric {
        background: rgba(255, 253, 247, 0.66);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.52);
      }

      .temperature-panel {
        display: grid;
        align-content: end;
        min-height: 154px;
        padding: 16px;
      }

      .temp {
        font-size: clamp(72px, 18vw, 112px);
        font-weight: 830;
        line-height: 0.78;
        letter-spacing: 0;
      }

      .fahrenheit {
        margin-top: 12px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 760;
      }

      .condition {
        display: grid;
        align-content: space-between;
        min-height: 154px;
        padding: 14px;
      }

      .condition-mark {
        position: relative;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: var(--sun);
      }

      .condition-mark::before,
      .condition-mark::after {
        content: "";
        position: absolute;
        border-radius: 999px;
      }

      .condition-mark::before {
        left: 19px;
        top: 31px;
        width: 54px;
        height: 19px;
        background: var(--paper-strong);
      }

      .condition-mark::after {
        left: 8px;
        top: 24px;
        width: 34px;
        height: 24px;
        background: var(--paper-strong);
      }

      .condition[data-kind="rain"] .condition-mark {
        background: var(--rain);
      }

      .condition[data-kind="snow"] .condition-mark {
        background: #dbe8eb;
      }

      .condition[data-kind="storm"] .condition-mark {
        background: #424d55;
      }

      .condition[data-kind="fog"] .condition-mark,
      .condition[data-kind="cloud"] .condition-mark {
        background: var(--sky);
      }

      .condition-text {
        margin-top: 20px;
        font-size: 15px;
        font-weight: 820;
        line-height: 1.15;
      }

      .summary {
        margin: 0;
        color: #39474d;
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        font-size: 17px;
        line-height: 1.36;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .metric {
        min-width: 0;
        padding: 12px 11px;
      }

      .metric-label {
        display: block;
        margin-bottom: 7px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 760;
        text-transform: uppercase;
      }

      .metric-value {
        display: block;
        overflow-wrap: anywhere;
        font-size: 21px;
        font-weight: 820;
        line-height: 1.05;
      }

      .metric-note {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 650;
      }

      [hidden] {
        display: none !important;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .empty::before {
          animation: none;
        }
      }

      @media (max-width: 460px) {
        .dashboard {
          min-height: 0;
          padding: 14px;
        }

        .header,
        .hero,
        .header,
        .hero {
          grid-template-columns: 1fr;
        }

        .timestamp {
          max-width: none;
          text-align: left;
        }

        .temperature-panel,
        .condition {
          min-height: 126px;
        }

        .metrics {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="dashboard" id="dashboard" aria-live="polite">
      <section class="empty" id="empty">Waiting for weather data...</section>

      <section class="content" id="content" hidden>
        <header class="header">
          <div>
            <p class="eyebrow">Current weather</p>
            <h1 id="city">Unknown city</h1>
          </div>
          <time class="timestamp" id="timestamp"></time>
        </header>

        <section class="hero" aria-label="Temperature and conditions">
          <div class="temperature-panel">
            <div class="temp" id="temp"></div>
            <div class="fahrenheit" id="fahrenheit"></div>
          </div>
          <div class="condition" id="conditionCard" data-kind="sun">
            <span class="condition-mark" aria-hidden="true"></span>
            <span class="condition-text" id="conditions"></span>
          </div>
        </section>

        <p class="summary" id="summary"></p>

        <section class="metrics" aria-label="Weather details">
          <div class="metric">
            <span class="metric-label">Humidity</span>
            <span class="metric-value" id="humidity"></span>
            <span class="metric-note" id="humidityNote"></span>
          </div>
          <div class="metric">
            <span class="metric-label">Wind</span>
            <span class="metric-value" id="wind"></span>
            <span class="metric-note">meters/sec</span>
          </div>
          <div class="metric">
            <span class="metric-label">Rain risk</span>
            <span class="metric-value" id="precipitation"></span>
            <span class="metric-note" id="rainNote"></span>
          </div>
        </section>

      </section>
    </main>

    <script>
      const elements = {
        empty: document.getElementById("empty"),
        content: document.getElementById("content"),
        city: document.getElementById("city"),
        temp: document.getElementById("temp"),
        fahrenheit: document.getElementById("fahrenheit"),
        timestamp: document.getElementById("timestamp"),
        conditionCard: document.getElementById("conditionCard"),
        conditions: document.getElementById("conditions"),
        summary: document.getElementById("summary"),
        humidity: document.getElementById("humidity"),
        humidityNote: document.getElementById("humidityNote"),
        wind: document.getElementById("wind"),
        precipitation: document.getElementById("precipitation"),
        rainNote: document.getElementById("rainNote"),
      };

      function unwrapToolOutput(raw) {
        return raw?.structuredContent ?? raw?.toolOutput ?? raw;
      }

      function conditionKind(conditions) {
        const value = String(conditions || "").toLowerCase();
        if (value.includes("rain") || value.includes("drizzle")) return "rain";
        if (value.includes("snow")) return "snow";
        if (value.includes("storm") || value.includes("thunder")) return "storm";
        if (value.includes("mist") || value.includes("fog")) return "fog";
        if (value.includes("cloud")) return "cloud";
        return "sun";
      }

      function formatTimestamp(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        return "Updated " + date.toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function humidityNote(value) {
        if (value === undefined) return "";
        if (value >= 75) return "humid";
        if (value <= 35) return "dry";
        return "comfortable";
      }

      function rainNote(value) {
        if (value === undefined) return "";
        if (value >= 60) return "pack rain gear";
        if (value >= 30) return "watch the sky";
        return "low chance";
      }

      function buildSummary(output) {
        const city = output.city || "This destination";
        const conditions = output.conditions
          ? output.conditions.toLowerCase()
          : "changing conditions";
        const temp =
          output.temperature_celsius === undefined
            ? "current"
            : output.temperature_celsius + "°C";
        return city + " is at " + temp + " with " + conditions + ".";
      }

      function showError(message) {
        elements.empty.textContent = message || "Weather data is unavailable.";
        elements.empty.className = "error";
        elements.empty.hidden = false;
        elements.content.hidden = true;
      }

      function render(raw) {
        const output = unwrapToolOutput(raw);
        if (!output) return;

        if (output.error) {
          showError(output.error);
          return;
        }

        elements.empty.hidden = true;
        elements.empty.className = "empty";
        elements.content.hidden = false;

        elements.city.textContent = output.city || "Unknown city";
        elements.temp.textContent =
          output.temperature_celsius === undefined
            ? "--"
            : output.temperature_celsius + "°C";
        elements.fahrenheit.textContent =
          output.temperature_fahrenheit === undefined
            ? ""
            : output.temperature_fahrenheit + "°F";
        elements.conditions.textContent = output.conditions || "Conditions unavailable";
        elements.conditionCard.dataset.kind = conditionKind(output.conditions);
        elements.timestamp.textContent = formatTimestamp(output.timestamp);
        elements.summary.textContent = buildSummary(output);
        elements.humidity.textContent =
          output.humidity === undefined ? "--" : output.humidity + "%";
        elements.humidityNote.textContent = humidityNote(output.humidity);
        elements.wind.textContent =
          output.wind_speed === undefined ? "--" : output.wind_speed;
        elements.precipitation.textContent =
          output.precipitation_probability === undefined
            ? "--"
            : output.precipitation_probability + "%";
        elements.rainNote.textContent = rainNote(output.precipitation_probability);
      }

      function currentToolOutput() {
        return window.openai?.toolOutput;
      }

      render(currentToolOutput());

      let checksRemaining = 50;
      const checkForLateOutput = window.setInterval(() => {
        render(currentToolOutput());
        checksRemaining -= 1;
        if (checksRemaining <= 0 || currentToolOutput()) {
          window.clearInterval(checkForLateOutput);
        }
      }, 100);

      window.addEventListener(
        "message",
        (event) => {
          let message = event.data;
          if (typeof message === "string") {
            try {
              message = JSON.parse(message);
            } catch {
              return;
            }
          }
          if (!message || message.jsonrpc !== "2.0") return;
          if (message.method !== "ui/notifications/tool-result") return;
          render(message.params);
        },
        { passive: true }
      );

      window.addEventListener(
        "openai:set_globals",
        (event) => {
          render(event.detail?.globals?.toolOutput ?? window.openai?.toolOutput);
        },
        { passive: true }
      );
    </script>
  </body>
</html>
