<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Day by day</title>
<style>
*,*::before,*::after{box-sizing:border-box}[hidden]{display:none!important}:root{color-scheme:light;--bg:#fff;--surface:#f7f7f7;--surface-2:#fbfbfb;--line:#e8e3dc;--line-strong:#d7d0c6;--text:#171412;--muted:#6f6a64;--soft:#9b948c;--accent:#9a4f2f;--danger:#a03a2b;--radius:10px;--shadow:0 1px 2px rgba(23,20,18,.04),0 8px 28px rgba(23,20,18,.06)}body{margin:0;min-width:280px;background:Canvas;color:CanvasText;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45;overflow-x:hidden}.shell{max-width:720px;margin:0 auto;padding:14px}.section-head{margin-bottom:10px}.section-kicker{color:var(--soft);font-size:11px;font-weight:650;letter-spacing:.06em;text-transform:uppercase}.section-title{margin:3px 0 0;color:var(--text);font-size:15px;font-weight:650}.section-desc{margin:2px 0 0;color:var(--muted);font-size:12px}.widget{border:1px solid var(--line);border-radius:var(--radius);background:var(--bg);box-shadow:var(--shadow);overflow:hidden}.empty,.error{min-height:236px;display:grid;place-items:center;padding:28px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);color:var(--muted);font-size:14px;text-align:center}.error{color:var(--danger)}.timeline{padding:3px 13px 13px}.day{display:grid;grid-template-columns:35px 1fr;gap:10px;padding-top:13px}.day+.day{border-top:1px solid var(--line);margin-top:12px}.date{width:35px;min-height:35px;border-radius:9px;border:1px solid var(--line);background:var(--surface-2);display:grid;place-items:center;color:var(--text);font-weight:720}.day h2{margin:0;color:var(--text);font-size:13px}.day-sub{color:var(--muted);font-size:12px;margin-top:1px}.slots{margin-top:9px;border-left:1px solid var(--line);padding-left:10px}.slot{position:relative;display:grid;grid-template-columns:76px 1fr;gap:10px;padding:8px 0}.slot::before{content:"";position:absolute;left:-14px;top:15px;width:7px;height:7px;border-radius:50%;border:1px solid var(--line-strong);background:var(--bg)}.time{color:var(--soft);font-size:11px;font-weight:650;font-variant-numeric:tabular-nums}.slot-title{color:var(--text);font-size:12px;font-weight:650}.slot-detail{color:var(--muted);font-size:11px;margin-top:1px}.gap{margin:10px 13px 13px;border:1px dashed var(--line-strong);border-radius:8px;padding:9px 10px;color:var(--muted);background:var(--surface-2);font-size:12px}
@media(max-width:430px){.slot{grid-template-columns:1fr;gap:2px}}
</style>
</head>
<body>
<main class="shell" aria-live="polite">
  <section class="empty" id="empty">Waiting for itinerary data...</section>
  <section id="content" hidden>
    <div class="section-head"><div class="section-kicker">Schedule</div><h1 class="section-title" id="tripTitle">Day by day</h1><p class="section-desc" id="summary">Structured enough to scan, sparse enough to stay readable in chat.</p></div>
    <article class="widget timeline" id="days" aria-label="Day by day"></article>
    <section class="gap" id="gaps" hidden></section>
  </section>
</main>
<script>
const elements={empty:document.getElementById("empty"),content:document.getElementById("content"),tripTitle:document.getElementById("tripTitle"),summary:document.getElementById("summary"),days:document.getElementById("days"),gaps:document.getElementById("gaps")};
function unwrapToolOutput(raw){return raw?.structuredContent??raw?.toolOutput??raw}
function showEmpty(message){elements.empty.textContent=message;elements.empty.className="empty";elements.empty.hidden=false;elements.content.hidden=true}
function showError(message){elements.empty.textContent=message||"Itinerary is unavailable.";elements.empty.className="error";elements.empty.hidden=false;elements.content.hidden=true}
function dayNumber(label,index){const match=String(label||"").match(/\d+/);return match?match[0]:String(index+1)}
function itemDetail(item){return[item.location_note,item.price_note,item.notes||item.raw_content].filter(Boolean).join(" · ")}
function renderDay(day,index){const section=document.createElement("div");section.className="day";section.innerHTML='<div class="date"></div><div><h2></h2><div class="day-sub"></div><div class="slots"></div></div>';section.querySelector(".date").textContent=dayNumber(day.label,index);section.querySelector("h2").textContent=day.label||"Scheduled";section.querySelector(".day-sub").textContent=day.summary||"";const slots=section.querySelector(".slots");(day.items||[]).forEach(item=>{const slot=document.createElement("div");slot.className="slot";slot.innerHTML='<div class="time"></div><div><div class="slot-title"></div><div class="slot-detail"></div></div>';slot.querySelector(".time").textContent=item.schedule_label||item.date_note||"Plan";slot.querySelector(".slot-title").textContent=item.title||item.raw_content||"Saved item";slot.querySelector(".slot-detail").textContent=itemDetail(item);slots.appendChild(slot)});return section}
function render(raw){const output=unwrapToolOutput(raw);if(!output)return;if(output.error){showError(output.error);return}const days=Array.isArray(output.days)?output.days:[];if(days.length===0&&!output.trip?.title){showEmpty("No itinerary data was returned.");return}elements.empty.hidden=true;elements.content.hidden=false;elements.tripTitle.textContent=output.trip?.title||"Day by day";elements.summary.textContent=(output.counts?.scheduled||0)+" scheduled item"+((output.counts?.scheduled||0)===1?"":"s");elements.days.replaceChildren();days.forEach((day,index)=>elements.days.appendChild(renderDay(day,index)));const gaps=Array.isArray(output.gaps)?output.gaps:[];elements.gaps.hidden=gaps.length===0;elements.gaps.textContent=gaps.join(" ")}
function currentToolOutput(){return window.openai?.toolOutput}
render(currentToolOutput());let checksRemaining=50;const checkForLateOutput=window.setInterval(()=>{render(currentToolOutput());checksRemaining-=1;if(checksRemaining<=0||currentToolOutput())window.clearInterval(checkForLateOutput)},100);
window.addEventListener("message",(event)=>{let message=event.data;if(typeof message==="string"){try{message=JSON.parse(message)}catch{return}}if(message?.jsonrpc==="2.0"&&message.method==="ui/notifications/tool-result")render(message.params)},{passive:true});
window.addEventListener("openai:set_globals",(event)=>{render(event.detail?.globals?.toolOutput??window.openai?.toolOutput)},{passive:true});
</script>
</body>
</html>
